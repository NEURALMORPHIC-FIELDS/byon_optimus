# BYON Optimus - Development Override Configuration
# ================================================
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Development features:
#   - Hot reload for TypeScript agents
#   - Verbose logging
#   - Lower resource limits
#   - Source code mounted for live editing
#
# Patent: EP25216372.0 - OmniVault - Vasile Lucian Borbeleac

version: '3.8'

services:
  # ============================================
  # Memory Service - Development Mode
  # ============================================
  memory-service:
    environment:
      - LOG_LEVEL=debug
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount source for live editing
      - ./byon-orchestrator/memory-service:/app:ro
      - ./INFINIT_MEMORYCONTEXT/fhrss_fcpe_unified.py:/app/fhrss_fcpe_unified.py:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # ============================================
  # Agent Worker - Development Mode
  # ============================================
  byon-worker:
    build:
      args:
        - AGENT_ROLE=worker
        - BUILD_TARGET=development
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      # Mount source for hot reload
      - ./byon-orchestrator/src:/app/src:ro
      - ./byon-config.ts:/app/byon-config.ts:ro
    command: ["npx", "tsx", "watch", "src/agents/worker/index.ts"]

  # ============================================
  # Agent Auditor - Development Mode
  # ============================================
  byon-auditor:
    build:
      args:
        - AGENT_ROLE=auditor
        - BUILD_TARGET=development
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      - ./byon-orchestrator/src:/app/src:ro
      - ./byon-config.ts:/app/byon-config.ts:ro
    command: ["npx", "tsx", "watch", "src/agents/auditor/index.ts"]

  # ============================================
  # Agent Executor - Development Mode
  # ============================================
  # Still air-gapped but with lower iteration limits
  byon-executor:
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - MAX_ITERATIONS=3
      - EXECUTION_TIMEOUT=300000
    volumes:
      - ./byon-orchestrator/src:/app/src:ro
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ============================================
  # OpenClaw Gateway - Development Mode
  # ============================================
  openclaw-gateway:
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    volumes:
      - ./Byon_bot/openclaw-main/src:/app/src:ro

  # ============================================
  # Development Tools
  # ============================================

  # Adminer for database inspection (if needed)
  adminer:
    image: adminer:4
    container_name: byon-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - byon-network
    profiles:
      - tools

  # Redis Commander for queue inspection
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: byon-redis-commander
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8082:8081"
    networks:
      - byon-network
    depends_on:
      - redis
    profiles:
      - tools
