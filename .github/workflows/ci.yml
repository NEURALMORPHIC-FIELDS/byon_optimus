name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-orchestrator:
    name: Lint & Test Orchestrator
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: byon-orchestrator/package-lock.json

      - name: Install dependencies
        working-directory: byon-orchestrator
        run: npm ci

      - name: Run linter
        working-directory: byon-orchestrator
        run: npm run lint

      - name: Run type check
        working-directory: byon-orchestrator
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: byon-orchestrator
        run: npm test
        env:
          NODE_ENV: test

  build-orchestrator:
    name: Build Orchestrator
    runs-on: ubuntu-latest
    needs: lint-and-test-orchestrator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: byon-orchestrator/package-lock.json

      - name: Install dependencies
        working-directory: byon-orchestrator
        run: npm ci

      - name: Build
        working-directory: byon-orchestrator
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-dist
          path: byon-orchestrator/dist/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-orchestrator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./byon-orchestrator
          file: ./byon-orchestrator/Dockerfile
          target: worker
          push: false
          tags: byon-worker:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Auditor image
        uses: docker/build-push-action@v5
        with:
          context: ./byon-orchestrator
          file: ./byon-orchestrator/Dockerfile
          target: auditor
          push: false
          tags: byon-auditor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Executor image
        uses: docker/build-push-action@v5
        with:
          context: ./byon-orchestrator
          file: ./byon-orchestrator/Dockerfile
          target: executor
          push: false
          tags: byon-executor:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        working-directory: byon-orchestrator
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: byon-orchestrator/package-lock.json

      - name: Install dependencies
        working-directory: byon-orchestrator
        run: npm ci

      - name: Validate execution plan schemas
        working-directory: byon-orchestrator
        run: npm run validate:plan || true
