name: production-release-pipeline
version: "1.0"
metadata:
  owner: release-team
  description: Full release pipeline including production deployment

steps:
  - id: lint
    name: Lint
    action: lint
    policy_gate: lint-gate

  - id: test
    name: Test
    action: test
    depends_on: [lint]
    policy_gate: test-gate

  - id: build
    name: Build
    action: build
    depends_on: [test]
    policy_gate: build-gate

  - id: scan
    name: Security Scan
    action: scan
    depends_on: [build]
    policy_gate: build-gate

  - id: deploy-staging
    name: Deploy Staging
    action: deploy
    environment: staging
    depends_on: [scan]
    policy_gate: staging-gate

  - id: deploy-production
    name: Deploy Production
    action: deploy
    environment: production
    depends_on: [deploy-staging]
    policy_gate: production-gate

  - id: notify
    name: Notify Stakeholders
    action: notify
    depends_on: [deploy-production]