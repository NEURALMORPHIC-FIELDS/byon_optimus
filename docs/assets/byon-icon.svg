<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="url(#blueGrad)" stroke-width="4"/>

  <!-- Hexagon Core (represents orchestration) -->
  <polygon points="256,80 356,148 356,284 256,352 156,284 156,148"
           fill="none" stroke="url(#blueGrad)" stroke-width="6" opacity="0.8"/>

  <!-- Inner Triangle (Worker) -->
  <polygon points="256,120 320,220 192,220"
           fill="url(#blueGrad)" opacity="0.9"/>

  <!-- Middle Ring (Auditor) -->
  <circle cx="256" cy="240" r="60" fill="none" stroke="url(#purpleGrad)" stroke-width="8"/>

  <!-- Center Dot (Executor) -->
  <circle cx="256" cy="240" r="20" fill="url(#purpleGrad)"/>

  <!-- Three Agent Nodes -->
  <circle cx="256" cy="140" r="15" fill="#4facfe"/> <!-- Worker -->
  <circle cx="176" cy="290" r="15" fill="#667eea"/> <!-- Auditor -->
  <circle cx="336" cy="290" r="15" fill="#00f2fe"/> <!-- Executor -->

  <!-- Connection Lines -->
  <line x1="256" y1="155" x2="256" y2="180" stroke="#4facfe" stroke-width="3"/>
  <line x1="186" y1="280" x2="210" y2="260" stroke="#667eea" stroke-width="3"/>
  <line x1="326" y1="280" x2="302" y2="260" stroke="#00f2fe" stroke-width="3"/>

  <!-- BYON Text -->
  <text x="256" y="400" text-anchor="middle"
        font-family="Arial, sans-serif" font-weight="bold" font-size="64"
        fill="url(#blueGrad)">BYON</text>

  <!-- Optimus Subtitle -->
  <text x="256" y="440" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="24"
        fill="#888" letter-spacing="8">OPTIMUS</text>

  <!-- Security Lock Symbol (small) -->
  <g transform="translate(380, 100)">
    <rect x="0" y="12" width="24" height="18" rx="3" fill="url(#purpleGrad)"/>
    <path d="M4,12 V8 A8,8 0 1,1 20,8 V12" fill="none" stroke="url(#purpleGrad)" stroke-width="3"/>
  </g>
</svg>
