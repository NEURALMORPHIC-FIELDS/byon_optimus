name: deploy-pipeline
steps:
  - name: build
    action: build_image
    environment: dev
    policy_gates: [dev-gate]
    params:
      image: myapp:latest

  - name: unit-tests
    action: run_tests
    environment: dev
    depends_on: [build]
    policy_gates: [dev-gate]

  - name: staging-deploy
    action: deploy
    environment: staging
    depends_on: [unit-tests]
    policy_gates: [staging-gate]
    params:
      target: staging-cluster

  - name: smoke-tests
    action: run_smoke
    environment: staging
    depends_on: [staging-deploy]
    policy_gates: [staging-gate]

  - name: prod-deploy
    action: deploy
    environment: prod
    depends_on: [smoke-tests]
    policy_gates: [prod-gate]
    condition:
      equals:
        var: environment
        value: production
    params:
      target: prod-cluster

  - name: notify-slack
    action: notify
    environment: dev
    depends_on: [prod-deploy]
    params:
      channel: "#deployments"