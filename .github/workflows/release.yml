name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: byon-orchestrator/package-lock.json

      - name: Install dependencies
        working-directory: byon-orchestrator
        run: npm ci

      - name: Build
        working-directory: byon-orchestrator
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image repository (lowercased)
        # GHCR requires repository paths to be entirely lowercase. The
        # `github.repository` context evaluates to e.g.
        # `NEURALMORPHIC-FIELDS/byon_optimus`, which is rejected by buildx.
        # Lowercase it once here and reuse the value in every push tag.
        id: imgrepo
        run: |
          echo "REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./byon-orchestrator
          file: ./byon-orchestrator/Dockerfile
          target: worker
          push: true
          tags: |
            ghcr.io/${{ steps.imgrepo.outputs.REPO }}/byon-worker:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ steps.imgrepo.outputs.REPO }}/byon-worker:latest

      - name: Build and push Auditor
        uses: docker/build-push-action@v5
        with:
          context: ./byon-orchestrator
          file: ./byon-orchestrator/Dockerfile
          target: auditor
          push: true
          tags: |
            ghcr.io/${{ steps.imgrepo.outputs.REPO }}/byon-auditor:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ steps.imgrepo.outputs.REPO }}/byon-auditor:latest

      - name: Build and push Executor
        uses: docker/build-push-action@v5
        with:
          context: ./byon-orchestrator
          file: ./byon-orchestrator/Dockerfile
          target: executor
          push: true
          tags: |
            ghcr.io/${{ steps.imgrepo.outputs.REPO }}/byon-executor:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ steps.imgrepo.outputs.REPO }}/byon-executor:latest

      # Per operator policy ("Do not create GitHub Release without separate
      # confirmation"), this workflow does NOT auto-publish a Release on tag
      # push. Docker images go to GHCR; the GitHub Release is created
      # manually (via `gh release create` or the web UI) only when the
      # operator approves the framing and content explicitly.
      #
      # `contents` permission was dropped from `write` to `read` for the
      # same reason — this workflow has no business creating releases or
      # mutating refs.
