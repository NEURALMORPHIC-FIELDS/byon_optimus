name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: byon-orchestrator/package-lock.json

      - name: Install dependencies
        working-directory: byon-orchestrator
        run: npm ci

      - name: Build
        working-directory: byon-orchestrator
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./byon-orchestrator
          file: ./byon-orchestrator/Dockerfile
          target: worker
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/byon-worker:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/byon-worker:latest

      - name: Build and push Auditor
        uses: docker/build-push-action@v5
        with:
          context: ./byon-orchestrator
          file: ./byon-orchestrator/Dockerfile
          target: auditor
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/byon-auditor:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/byon-auditor:latest

      - name: Build and push Executor
        uses: docker/build-push-action@v5
        with:
          context: ./byon-orchestrator
          file: ./byon-orchestrator/Dockerfile
          target: executor
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/byon-executor:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/byon-executor:latest

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            byon-orchestrator/dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
