name: deploy-pipeline
steps:
  - name: build
    action: compile
    environment: dev

  - name: unit-tests
    action: pytest
    depends_on: [build]
    environment: dev

  - name: staging-deploy
    action: deploy
    depends_on: [unit-tests]
    policy_gates: [staging-gate]
    environment: staging

  - name: smoke-tests
    action: smoke
    depends_on: [staging-deploy]
    environment: staging

  # prod-deploy only runs when environment variable equals "production".
  # If skipped, post-deploy-notify is still attempted (skipped != failed).
  - name: prod-deploy
    action: deploy
    depends_on: [smoke-tests]
    policy_gates: [prod-gate]
    environment: prod
    condition:
      equals:
        var: target_env
        value: production

  - name: post-deploy-notify
    action: notify
    depends_on: [prod-deploy]
    environment: prod
    condition:
      equals:
        var: target_env
        value: production