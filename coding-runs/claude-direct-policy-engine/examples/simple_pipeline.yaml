name: simple-ci-pipeline
version: "1.0"
description: A simple CI pipeline demonstrating policy-gated steps.

gates:
  dev_gate:
    required_role: developer
    description: Requires developer role to proceed
  qa_gate:
    required_role: qa
    description: Requires QA role to proceed
  staging_gate:
    required_role: release_manager
    description: Requires release manager role to proceed

steps:
  - id: checkout
    name: Checkout Source Code
    action: git.checkout
    params:
      branch: main

  - id: lint
    name: Lint Code
    action: lint.run
    depends_on: [checkout]
    policy_gates: [dev_gate]

  - id: unit_tests
    name: Run Unit Tests
    action: test.unit
    depends_on: [checkout]
    policy_gates: [dev_gate]

  - id: build
    name: Build Artefact
    action: build.package
    depends_on: [lint, unit_tests]
    policy_gates: [dev_gate]

  - id: integration_tests
    name: Integration Tests
    action: test.integration
    depends_on: [build]
    policy_gates: [qa_gate]

  - id: staging_deploy
    name: Deploy to Staging
    action: deploy.staging
    depends_on: [integration_tests]
    policy_gates: [staging_gate]