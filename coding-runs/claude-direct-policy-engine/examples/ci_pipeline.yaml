id: ci_pipeline
name: CI/CD Pipeline Example

metadata:
  owner: platform-team
  version: "1.0"

steps:
  - id: build
    name: Build Application
    action: build
    params:
      artifact: app.tar.gz

  - id: unit_tests
    name: Run Unit Tests
    action: test
    depends_on: [build]
    policy_gate: test_gate

  - id: staging_deploy
    name: Deploy to Staging
    action: deploy
    depends_on: [unit_tests]
    environment: staging
    policy_gate: deploy_gate
    params:
      target: staging.example.internal

  - id: db_migrate
    name: Database Migration
    action: migrate
    depends_on: [staging_deploy]
    environment: staging
    policy_gate: migrate_gate

  - id: notify_team
    name: Notify Team
    action: notify
    depends_on: [db_migrate]
    policy_gate: notify_gate
    params:
      channel: "#deployments"
      message: "Staging deploy complete"