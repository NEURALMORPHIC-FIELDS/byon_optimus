name: conditional-deploy-pipeline
version: "1.0"
description: >
  Deploy to staging always; deploy to production only when the
  `environment` variable equals "production".

gates:
  dev_gate:
    required_role: developer
    description: Requires developer role
  release_gate:
    required_role: release_manager
    description: Requires release manager role for production deploys

steps:
  - id: build
    name: Build
    action: build.run
    policy_gates: [dev_gate]

  - id: test
    name: Test
    action: test.run
    depends_on: [build]
    policy_gates: [dev_gate]

  - id: deploy_staging
    name: Deploy to Staging
    action: deploy.staging
    depends_on: [test]
    policy_gates: [dev_gate]

  - id: smoke_test
    name: Smoke Test (Staging)
    action: test.smoke
    depends_on: [deploy_staging]
    policy_gates: [dev_gate]

  - id: deploy_prod
    name: Deploy to Production
    action: deploy.production
    depends_on: [smoke_test]
    policy_gates: [release_gate]
    condition:
      equals:
        var: environment
        value: production