# ============================================================================
# BYON Optimus - Grafana Dashboard Provisioning
# ============================================================================
# Auto-load dashboards from JSON files
# ============================================================================

apiVersion: 1

providers:
  - name: 'BYON Optimus Dashboards'
    orgId: 1
    folder: 'BYON Optimus'
    folderUid: 'byon-optimus'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
