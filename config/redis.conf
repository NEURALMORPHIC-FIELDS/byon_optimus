# ============================================================================
# BYON Optimus - Redis Configuration
# ============================================================================
# Optimized for message queue reliability and production workloads
# AUDIT FIX: Increased memory from 256MB to 1GB per performance audit
# ============================================================================

# MEMORY - Increased for production workloads
# Previous: 256MB (insufficient under load, caused evictions)
# Current: 1GB (supports AOF rewrites + cache pressure)
maxmemory 1gb
maxmemory-policy allkeys-lru

# SECURITY - Password authentication
# Set REDIS_PASSWORD in .env for production deployments
# Password is passed via --requirepass in docker-compose.yml

# PERSISTENCE - AOF (Append Only File)
appendonly yes
appendfilename "appendonly.aof"
appenddirname "appendonlydir"

# AOF fsync policy:
# - everysec: fsync every second (good balance of performance/safety)
# - always: fsync after every write (safest, slowest)
# - no: let OS handle it (fastest, least safe)
appendfsync everysec

# AOF rewrite settings
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# RDB (Snapshotting) - disabled for queue workload
# AOF is sufficient for message queue
save ""

# NETWORKING
bind 0.0.0.0
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# LOGGING
loglevel notice

# LIMITS - Increased for multi-agent scenarios
# AUDIT FIX: Increased from 100 to 200 for multi-agent workloads
maxclients 200

# LATENCY MONITORING
latency-monitor-threshold 100

# SLOW LOG
slowlog-log-slower-than 10000
slowlog-max-len 128

# ADVANCED
activerehashing yes
hz 10
dynamic-hz yes
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes
